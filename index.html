<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e74c6f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Meryem</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="img/heart.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="img/heart-180.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <svg class="auth-heart" viewBox="0 0 100 100" width="60" height="60">
        <path fill="#e74c6f" d="M50 88.7L7.1 45.8C-4.6 34.1-2.3 15.5 12.1 8.2c10.6-5.4 22.5-2.2 29.9 6.8L50 24.3l8-9.3c7.4-9 19.3-12.2 29.9-6.8 14.4 7.3 16.7 25.9 5 37.6L50 88.7z"/>
      </svg>
      <h1 class="auth-title">Meryem</h1>
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <input type="email" id="login-email" placeholder="E-posta" required>
        </div>
        <div class="form-group">
          <input type="password" id="login-password" placeholder="Şifre" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Giriş Yap</button>
        <p id="login-error" class="login-error"></p>
      </form>
    </div>
  </div>

  <!-- App Content (hidden until auth) -->
  <div id="app-content" style="display:none">

  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <h1 class="header-title">Meryem</h1>
      <button id="logout-btn" class="btn-logout" title="Çıkış">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      </button>
    </div>
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="daily-view">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        Günlük
      </button>
      <button class="tab-btn" data-tab="gallery-view">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4zM2 6v14c0 1.1.9 2 2 2h14v-2H4V6H2z"/></svg>
        Galeri
      </button>
      <button class="tab-btn" data-tab="map-view">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
        Harita
      </button>
    </nav>
  </header>

  <!-- Daily View -->
  <section id="daily-view" class="view active">
    <div class="daily-container">

      <!-- Daily Message -->
      <div class="card message-card">
        <p class="message-label">Bugünün Mesajı</p>
        <p class="message-text" id="daily-message"></p>
        <button class="btn-shuffle" id="shuffle-btn" title="Başka bir söz">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
      </div>

      <!-- Countdown -->
      <div class="card countdown-card">
        <p class="countdown-label">Yıldönümüne Kalan</p>
        <div class="countdown" id="countdown"></div>
      </div>

      <!-- To-Do List -->
      <div class="card todo-card">
        <p class="todo-label">Birlikte Yapacaklarımız</p>
        <form class="todo-form" id="todo-form">
          <input type="text" id="todo-input" placeholder="Yeni plan ekle..." autocomplete="off" maxlength="120">
          <button type="submit" class="btn btn-primary">+</button>
        </form>
        <div class="todo-list" id="todo-list"></div>
      </div>

    </div>
  </section>

  <!-- Gallery View -->
  <section id="gallery-view" class="view">
    <div class="daily-container">
      <div class="card">
        <p class="gallery-label">Anılarımız</p>
        <div class="gallery-grid" id="gallery-grid"></div>
      </div>
    </div>
  </section>

  <!-- Map View -->
  <section id="map-view" class="view">
    <div id="map"></div>
    <button class="map-hint" id="map-hint">Haritaya dokun, anı ekle</button>
  </section>

  <!-- Add Memory Modal -->
  <div class="modal-overlay" id="memory-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Yeni Anı</h2>
        <button class="modal-close" data-close-modal="memory-modal">&times;</button>
      </div>
      <form id="memory-form">
        <input type="hidden" id="memory-lat">
        <input type="hidden" id="memory-lng">
        <div class="form-group">
          <label for="memory-title">Başlık</label>
          <input type="text" id="memory-title" required placeholder="Bu anının adı..." maxlength="80">
        </div>
        <div class="form-group">
          <label for="memory-date">Tarih</label>
          <input type="date" id="memory-date">
        </div>
        <div class="form-group">
          <label for="memory-note">Not</label>
          <textarea id="memory-note" rows="3" placeholder="Bu anı hakkında birkaç satır..."></textarea>
        </div>
        <div class="form-group">
          <label for="memory-photo">Fotoğraf</label>
          <input type="file" id="memory-photo" accept="image/*">
          <img id="photo-preview" class="photo-preview" alt="Önizleme">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Kaydet</button>
      </form>
    </div>
  </div>

  <!-- Memory Detail Modal -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Anı</h2>
        <button class="modal-close" data-close-modal="detail-modal">&times;</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>

  </div><!-- /app-content -->

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
  <script src="js/data.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/map.js"></script>
  <script src="js/daily.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
